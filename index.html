<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Shift — 중력을 바꾸는 구체 점프맵</title>
  <link rel="stylesheet" href="./src/ui/style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>로딩 중...</p>
  </div>

  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div class="hud-top-left">
      <div id="stage-name">Stage 1-1</div>
      <div id="timer">00:00.00</div>
    </div>

    <div class="hud-top-right">
      <div id="gravity-indicator">
        <div class="label">중력 / GRAVITY</div>
        <div class="arrow-wrap">
          <div id="gravity-arrow">↓</div>
          <div id="gravity-axis">-Y</div>
        </div>
      </div>
    </div>

    <div class="hud-bottom-left">
      <div class="label">남은 중력 전환</div>
      <div id="shifts-remaining">∞</div>
    </div>

    <div class="hud-bottom-right" id="checkpoint-toast"></div>

    <div id="gravity-mode-overlay" class="hidden">
      <div class="gravity-helper">
        <div class="key-row">중력 방향 선택</div>
        <div class="key-grid">
          <div></div>
          <div class="key">W<span>전방</span></div>
          <div class="key">SPACE<span>위</span></div>
          <div class="key">A<span>좌</span></div>
          <div class="key">S<span>후방</span></div>
          <div class="key">D<span>우</span></div>
          <div class="key">CTRL<span>아래</span></div>
        </div>
        <div class="hint">Q를 떼면 적용됩니다</div>
      </div>
    </div>

    <div id="goal-toast" class="hidden">
      <div class="title">🏁 CLEAR!</div>
      <div class="sub">SPACE로 다음 스테이지</div>
    </div>
  </div>

  <div id="menu" class="hidden">
    <div class="menu-card">
      <h1>🌀 GRAVITY SHIFT</h1>
      <p class="tagline">"점프만으로는 닿을 수 없는 곳이 있다. 중력이 곧 길이다."</p>
      <div class="stage-list" id="stage-list"></div>
      <div class="controls-help">
        <h3>조작</h3>
        <table>
          <tr><td>W A S D</td><td>이동</td></tr>
          <tr><td>SPACE</td><td>점프</td></tr>
          <tr><td>Q (홀드)</td><td>중력 전환 모드</td></tr>
          <tr><td>마우스</td><td>카메라 회전 (클릭하여 잠금)</td></tr>
          <tr><td>R</td><td>리스폰</td></tr>
          <tr><td>ESC</td><td>메뉴</td></tr>
        </table>
      </div>
    </div>
  </div>

  <div id="pause" class="hidden">
    <div class="pause-card">
      <h2>일시정지</h2>
      <button data-action="resume">계속하기</button>
      <button data-action="respawn">리스폰</button>
      <button data-action="menu">메인 메뉴</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
